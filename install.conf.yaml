- defaults:
    link:
      relink: true

- clean: ['~']

- shell:
  - [mkdir -p ~/.git, Creating ~/.git folder]
  - [mkdir -p ~/.config/, Creating ~/.config folder]
  - [cp -R alacritty ~/.config, Copying configs to ~/.config/alacritty folder]

- link:
    # shell stuff
    ~/.aliases: shell/aliases
    ~/.zshrc: shell/zshrc
    ~/.zshrc_local:
      path: shell/zshrc_local
      ignore-missing: true
    ~/.zimrc: shell/zimrc
    ~/.p10k.zsh: shell/p10k.zsh

    # Brewfile
    ~/.config/Brewfile: Brewfile
    ~/.config/Brewfile.local:
      path: Brewfile.local
      ignore-missing: true

    # git
    ~/.gitconfig: git/gitconfig
    ~/.gitconfig_local:
      path: git/gitconfig_local
      ignore-missing: true
    ~/.git/git-editor: git/git-editor.sh
    ~/.git/git-clone-bare-for-worktrees.sh: git/git-clone-bare-for-worktrees.sh
    "~/Library/Application Support/lazygit/config.yml": git/lazygit.config.yml

    # vim
    ~/.vimrc: vim/vimrc
    ~/.ideavimrc: vim/ideavimrc

    # nvim
    ~/.config/nvim: nvim

    # tmux
    ~/.tmux.conf: tmux/tmux.conf

    # window management
    ~/.config/yabai: config/yabai
    ~/.config/skhd: config/skhd

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  -
    command: brew bundle --describe --file ~/.config/Brewfile
    stdout: true
    description: brew install from Brewfile
  -
    command: '[ -f ~/.config/Brewfile.local ] && brew bundle --file ~/.config/Brewfile.local || true'
    stdout: true
    description: brew install from Brewfile.local (if present)
  -
    command: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
    stdout: true
    description: Install Tmux Plugin Manager (tpm)
  -
    command: '[ -f install.local.yaml ] && ./install -c install.local.yaml || true'
    description: run local install overrides (if present)
